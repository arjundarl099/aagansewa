<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --border: #222226;
      --accent: #c8a96e;
      --accent2: #e8c99e;
      --text: #f0ece4;
      --muted: #7a7870;
      --input-bg: #1a1a1e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background grain + glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(200,169,110,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 10% 80%, rgba(200,169,110,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 960px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      max-width: 480px;
      gap: 0;
      border: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
    }

    /* Left panel */
    .left {
      padding: 56px 48px;

      display: flex;
      flex-direction: column;
      gap: 40px;
      position: relative;
      background: linear-gradient(160deg, #161618 0%, #111113 100%);
    }

    .left::after {
      content: '';
      position: absolute;
      bottom: -60px;
      right: -60px;
      width: 200px;
      height: 200px;
      border: 1px solid rgba(200,169,110,0.12);
      border-radius: 50%;
      pointer-events: none;
    }

    .tag {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
    }

    .left h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 900;
      line-height: 1.1;
      color: var(--text);
    }

    .left h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .left p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.8;
    }

    .contact-items {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .icon-box {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--accent);
      font-size: 14px;
    }

    .contact-item .ci-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .contact-item .ci-value {
      font-size: 13px;
      color: var(--text);
    }

    .socials {
      display: flex;
      gap: 10px;
    }

    .social-btn {
      width: 34px;
      height: 34px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
      cursor: pointer;
    }

    .social-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Right panel - form */
    .right {
      padding: 56px 48px;
    }

    .right h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .right > p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: #3a3a3e;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--accent);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 110px;
    }

    .form-group select option {
      background: #1a1a1e;
    }

    .submit-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .submit-note {
      font-size: 11px;
      color: var(--muted);
    }

    .btn-submit {
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 13px 28px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.2s;
    }

    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }

    .btn-submit:hover::after {
      transform: translateX(0);
    }

    /* Success message */
    .success-msg {
      display: none;
      padding: 14px 18px;
      border: 1px solid rgba(200,169,110,0.4);
      background: rgba(200,169,110,0.06);
      color: var(--accent2);
      font-size: 13px;
      margin-top: 20px;
    }

    /* Animations */
    .wrapper { animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .left > * {
      animation: fadeUp 0.6s ease both;
    }
    .left > *:nth-child(1) { animation-delay: 0.1s; }
    .left > *:nth-child(2) { animation-delay: 0.2s; }
    .left > *:nth-child(3) { animation-delay: 0.3s; }
    .left > *:nth-child(4) { animation-delay: 0.4s; }
    .left > *:nth-child(5) { animation-delay: 0.5s; }

    /* Responsive */
    @media (max-width: 700px) {
      .wrapper { grid-template-columns: 1fr; }
      .left { border-right: none; border-bottom: 1px solid var(--border); padding: 40px 28px; }
      .right { padding: 40px 28px; }
      .form-row { grid-template-columns: 1fr; }
      .submit-row { flex-direction: column; gap: 16px; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- Left Info Panel -->
  <div class="left">
    <span class="tag">Contact</span>

    <h1>Let's <em>Talk</em><br/>About Your Project</h1>

    <p>हाम्रो team तपाईंको project को बारेमा सुन्न उत्सुक छ। तल form भर्नुस् वा सिधै contact गर्नुस्।</p>

    <div class="contact-items">
      <div class="contact-item">
        <div class="icon-box">✉</div>
        <div>
          <div class="ci-label">Email</div>
          <div class="ci-value">hello@yourproject.com</div>
        </div>
      </div>
      <div class="contact-item">
        <div class="icon-box">☏</div>
        <div>
          <div class="ci-label">Phone</div>
          <div class="ci-value">+977 98XXXXXXXX</div>
        </div>
      </div>
      <div class="contact-item">
        <div class="icon-box">◎</div>
        <div>
          <div class="ci-label">Location</div>
          <div class="ci-value">Kathmandu, Nepal</div>
        </div>
      </div>
    </div>


  </div>



</div>

<script>
  function handleSubmit() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const message = document.getElementById('message').value.trim();

    if (!name || !email || !message) {
      alert('कृपया सबै अनिवार्य fields भर्नुस्।');
      return;
    }

    const btn = document.querySelector('.btn-submit');
    btn.textContent = 'Sending...';
    btn.style.opacity = '0.7';

    setTimeout(() => {
      btn.textContent = 'Sent ✓';
      btn.style.background = '#4a7c59';
      document.getElementById('successMsg').style.display = 'block';
    }, 1200);
  }
</script>

</body>
</html>

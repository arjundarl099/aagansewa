<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard – Aagan Sewa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.5.0/css/all.css" crossorigin="anonymous">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['Fraunces', 'serif'],
          body: ['DM Sans', 'sans-serif'],
          mono: ['IBM Plex Mono', 'monospace'],
        },
        colors: {
          pine: { DEFAULT: '#0f3d2e', light: '#155c44', pale: '#e9f3ee' },
          marigold: { DEFAULT: '#e3a72e', dark: '#c48a1a' },
          crimson: { DEFAULT: '#c81d25', dark: '#9e1218' },
        },
      },
    },
  };
</script>
<style>
  #toast.show { opacity: 1; }
  table th, table td { white-space: nowrap; }
</style>
</head>
<body class="font-body bg-pine-pale text-[#12261d] m-0">

<!-- Navbar -->
<nav class="flex items-center justify-between px-6 md:px-10 h-[74px] bg-pine sticky top-0 z-50">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 bg-crimson rounded-lg flex items-center justify-center text-xl">🚑</div>
    <div>
      <div class="text-xl font-display font-semibold text-white tracking-tight"> <a href="index.html">Aagan Sewa</a> </div>
      <div class="text-[0.62rem] font-mono text-marigold tracking-[0.2em] uppercase">Admin Dashboard</div>
    </div>
  </div>
  <button onclick="logout()" class="text-white/75 text-sm font-medium px-4 py-2 rounded-md hover:bg-white/10 hover:text-white transition">
    <i class="fa-solid fa-right-from-bracket mr-1"></i> Log out
  </button>
</nav>

<div class="max-w-7xl mx-auto px-6 md:px-10 py-8">

  <!-- Tabs -->
  <div class="flex gap-2 mb-6 bg-white rounded-lg p-1 border border-pine/10 w-fit">
    <button id="tab-providers" onclick="switchTab('providers')" class="text-sm font-semibold px-5 py-2 rounded-md transition">Providers</button>
    <button id="tab-services" onclick="switchTab('services')" class="text-sm font-semibold px-5 py-2 rounded-md transition">Services</button>
    <button id="tab-bookings" onclick="switchTab('bookings')" class="text-sm font-semibold px-5 py-2 rounded-md transition">Bookings</button>
  </div>

  <!-- PROVIDERS TAB -->
  <div id="panel-providers" class="bg-white rounded-2xl border border-pine/10 shadow-sm overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-left border-b border-pine/10 text-pine/60 font-mono text-xs uppercase">
          <th class="px-5 py-3">Name</th>
          <th class="px-5 py-3">Type</th>
          <th class="px-5 py-3">Location</th>
          <th class="px-5 py-3">Verified</th>
          <th class="px-5 py-3">Active</th>
          <th class="px-5 py-3">Actions</th>
        </tr>
      </thead>
      <tbody id="providers-tbody">
        <tr><td colspan="6" class="px-5 py-8 text-center text-pine/40">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- SERVICES TAB -->
  <div id="panel-services" class="hidden bg-white rounded-2xl border border-pine/10 shadow-sm overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-left border-b border-pine/10 text-pine/60 font-mono text-xs uppercase">
          <th class="px-5 py-3">Service</th>
          <th class="px-5 py-3">Category</th>
          <th class="px-5 py-3">Provider</th>
          <th class="px-5 py-3">Price</th>
          <th class="px-5 py-3">Capacity</th>
          <th class="px-5 py-3">Available</th>
          <th class="px-5 py-3">Actions</th>
        </tr>
      </thead>
      <tbody id="services-tbody">
        <tr><td colspan="7" class="px-5 py-8 text-center text-pine/40">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- BOOKINGS TAB -->
  <div id="panel-bookings" class="hidden bg-white rounded-2xl border border-pine/10 shadow-sm overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-left border-b border-pine/10 text-pine/60 font-mono text-xs uppercase">
          <th class="px-5 py-3">User</th>
          <th class="px-5 py-3">Provider</th>
          <th class="px-5 py-3">Service</th>
          <th class="px-5 py-3">Date</th>
          <th class="px-5 py-3">Time</th>
          <th class="px-5 py-3">Status</th>
        </tr>
      </thead>
      <tbody id="bookings-tbody">
        <tr><td colspan="6" class="px-5 py-8 text-center text-pine/40">Loading…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-pine text-white text-sm font-medium px-5 py-3 rounded-lg shadow-lg opacity-0 pointer-events-none transition-opacity duration-300 z-[110]">
  <span id="toast-msg"></span>
</div>

<script src="js/admin.js"></script>
</body>
</html>

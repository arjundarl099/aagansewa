<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Provider – Aagan Sewa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.5.0/css/all.css" crossorigin="anonymous">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['Fraunces', 'serif'],
          body: ['DM Sans', 'sans-serif'],
          mono: ['IBM Plex Mono', 'monospace'],
        },
        colors: {
          pine: { DEFAULT: '#0f3d2e', light: '#155c44', pale: '#e9f3ee' },
          marigold: { DEFAULT: '#e3a72e', dark: '#c48a1a' },
          crimson: { DEFAULT: '#c81d25', dark: '#9e1218' },
        },
      },
    },
  };
</script>
<style>
  .seal { transform: rotate(-8deg); }
  .card-lift { transition: transform .25s ease, box-shadow .25s ease; }
  .card-lift:hover { transform: translateY(-6px); }
</style>
</head>
<body class="font-body bg-pine-pale text-[#12261d] m-0">

<!-- Navbar -->
<nav class="flex items-center justify-between px-6 md:px-10 h-[74px] bg-pine sticky top-0 z-50">
  <a href="index.html" class="flex items-center gap-3 no-underline">
    <div class="w-10 h-10 bg-crimson rounded-lg flex items-center justify-center text-xl shadow-[0_0_16px_rgba(200,29,37,0.55)]">🚑</div>
    <div>
      <div class="text-xl font-display font-semibold text-white tracking-tight">Aagan Sewa</div>
      <div class="text-[0.62rem] font-mono text-marigold tracking-[0.2em] uppercase">Nepal Emergency &amp; Home Services</div>
    </div>
  </a>
  <ul class="hidden md:flex gap-1 list-none m-0 p-0 items-center">
    <li><a href="index.html" class="text-white/75 no-underline text-sm font-medium px-4 py-2 rounded-md hover:bg-white/10 hover:text-white transition">Home</a></li>
    <li><a href="provider.html" class="text-white/75 no-underline text-sm font-medium px-4 py-2 rounded-md hover:bg-white/10 hover:text-white transition">Providers</a></li>
    <li id="nav-login-item"><a href="login.html" class="ml-2 bg-crimson text-white no-underline text-sm font-semibold px-5 py-2.5 rounded-md hover:bg-crimson-dark transition">Log in</a></li>
    <li id="nav-dashboard-item" class="hidden"><a href="dashboard.html" class="ml-2 bg-crimson text-white no-underline text-sm font-semibold px-5 py-2.5 rounded-md hover:bg-crimson-dark transition">Dashboard</a></li>
  </ul>
</nav>

<!-- Provider header -->
<section id="provider-header" class="bg-pine text-white px-6 md:px-10 pt-14 pb-10 relative overflow-hidden">
  <div class="max-w-3xl mx-auto text-center relative z-10">
    <p class="text-white/50 font-mono text-xs">Loading provider…</p>
  </div>
</section>

<!-- Back link -->
<div class="max-w-6xl mx-auto px-6 md:px-10 pt-6">
  <a href="provider.html" class="inline-flex items-center gap-2 text-sm font-medium text-pine hover:text-pine-light no-underline">
    <i class="fa-solid fa-arrow-left text-xs"></i> Back to all providers
  </a>
</div>

<!-- Services Grid -->
<div id="services-grid" class="max-w-6xl mx-auto px-6 md:px-10 pt-6 pb-20 grid grid-cols-[repeat(auto-fill,minmax(310px,1fr))] gap-6">
  <p class="col-span-full text-center text-pine/50 font-mono text-sm py-10">Loading services…</p>
</div>

<!-- Footer -->
<footer class="bg-pine text-white/60 text-center px-10 py-10 text-sm">
  <p class="font-mono text-xs tracking-wide">© 2025 AAGAN SEWA · MAKING LIFE EASIER, ONE SERVICE AT A TIME.</p>
</footer>

<!-- Booking Modal -->
<div id="bookingModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/40 px-4 open:flex" style="display:none;">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-display font-semibold text-xl text-pine">Book this service</h3>
      <button onclick="closeBookingModal()" class="text-pine/40 hover:text-pine text-xl leading-none">&times;</button>
    </div>
    <p id="modal-provider-name" class="text-sm text-pine/60 mb-4 font-mono"></p>

    <label class="block text-sm font-medium text-[#12261d]/80 mb-1">Date</label>
    <input id="f-date" type="date" class="w-full border border-pine/15 rounded-md px-3 py-2 mb-4 text-sm focus:outline-none focus:ring-2 focus:ring-pine/30" />

    <label class="block text-sm font-medium text-[#12261d]/80 mb-1">Preferred time</label>
    <input id="f-time" type="time" class="w-full border border-pine/15 rounded-md px-3 py-2 mb-4 text-sm focus:outline-none focus:ring-2 focus:ring-pine/30" />

    <label class="block text-sm font-medium text-[#12261d]/80 mb-1">Notes (optional)</label>
    <textarea id="f-desc" rows="3" class="w-full border border-pine/15 rounded-md px-3 py-2 mb-5 text-sm focus:outline-none focus:ring-2 focus:ring-pine/30" placeholder="Anything the provider should know..."></textarea>

    <div class="flex gap-3">
      <button onclick="closeBookingModal()" class="flex-1 border border-pine/15 text-pine text-sm font-semibold py-2.5 rounded-md hover:bg-pine-pale transition">Cancel</button>
      <button onclick="submitBooking()" class="flex-1 bg-crimson hover:bg-crimson-dark text-white text-sm font-semibold py-2.5 rounded-md transition">Confirm Booking</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-pine text-white text-sm font-medium px-5 py-3 rounded-lg shadow-lg opacity-0 pointer-events-none transition-opacity duration-300 z-[110]">
  <span id="toast-msg"></span>
</div>

<style>
  #bookingModal.open { display: flex !important; }
  #toast.show { opacity: 1; }
</style>

<script src="js/service.js"></script>
<script>
  (function initAuthNav() {
    const token = localStorage.getItem('token');
    const loginItem = document.getElementById('nav-login-item');
    const dashboardItem = document.getElementById('nav-dashboard-item');

    if (!loginItem || !dashboardItem) return;

    if (token) {
      loginItem.classList.add('hidden');
      dashboardItem.classList.remove('hidden');
    } else {
      loginItem.classList.remove('hidden');
      dashboardItem.classList.add('hidden');
    }
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center gap-20">

<div class="w-full max-w-sm bg-white p-8 rounded-2xl shadow-xl">

  <h2 class="text-2xl font-bold text-center mb-6">Login</h2>

  <form id="loginForm" class="flex flex-col gap-8">

    <input 
      id="email" 
      type="email" 
      placeholder="Enter your email"
      class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
      autocomplete="off"
    />

    <input 
      id="password" 
      type="password" 
      placeholder="Enter your password"
      class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
    />

    <button 
      type="submit"
      class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition"
    >
      Login
    </button>

  </form>

</div>
 <p class="text-2xl font-semibold">if you are new  <a href="register.html" class="text-blue-500">register here</a></p>
</body>
<script src="js/login.js"></script>
</body>
</html>

<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 h-screen flex items-center justify-center">

  <form id="registerForm" class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md flex flex-col gap-4">
    <h2 class="text-2xl font-bold text-center mb-4">Register</h2>

    <div class="flex flex-col">
      <label for="username" class="mb-1 font-medium">Username</label>
      <input id="username" type="text" placeholder="John Doe" required
        class="border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div class="flex flex-col">
      <label for="email" class="mb-1 font-medium">Email</label>
      <input id="email" type="email" placeholder="xyz@gmail.com" required
        class="border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div class="flex flex-col">
      <label for="password" class="mb-1 font-medium">Password</label>
      <input id="password" type="password" placeholder="•••••••" required
        class="border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div class="flex flex-col">
      <label for="role" class="mb-1 font-medium">Role</label>
      <!-- value must match backend's expected role string -->
      <select id="role" class="border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="user">User</option>
        <option value="provider">Provider</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <input type="submit" class="bg-blue-500 text-white p-2 rounded hover:bg-blue-600 cursor-pointer transition mt-4" value="Submit">
  </form>

  <script src="js/register.js"></script>
</body>
</html>
